# DevPulse 站点配置
# HTTP → HTTPS 重定向 + /api/ 反向代理 + 静态文件服务

# ── HTTP (端口 80) — 重定向到 HTTPS + Let's Encrypt 验证 ──
server {
    listen 80;
    listen [::]:80;
    server_name devpulse.app api.devpulse.app;

    # Let's Encrypt ACME 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 所有其他请求 → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (端口 443) — 主服务 ─────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name devpulse.app api.devpulse.app;

    # SSL 证书（由 certbot 管理）
    ssl_certificate /etc/letsencrypt/live/devpulse.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devpulse.app/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/devpulse.app/chain.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS（生产环境启用）
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── API 反向代理 ──────────────────────────────
    location /api/ {
        # 移除 /api 前缀
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://devpulse-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        # 缓冲
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }

    # ── 健康检查（透传） ──────────────────────────
    location = /health {
        proxy_pass http://devpulse-api:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── 静态文件 (React SPA) ─────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存头（带 hash 的文件名）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept-Encoding";
        }

        # HTML 不缓存
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # ── Let's Encrypt 验证 ────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── 安全限制 ──────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ── Legacy HTTP API（无 SSL，用于 certbot 首次验证）──
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location /health {
        proxy_pass http://devpulse-api:8000/health;
        access_log off;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
