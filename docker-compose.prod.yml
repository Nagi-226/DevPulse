# DevPulse 生产环境 Docker Compose
# Nginx + FastAPI + PostgreSQL + Certbot
# 用法: docker compose -f docker-compose.prod.yml up -d

version: "3.9"

services:
  # ── Nginx 反向代理 ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: devpulse-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./desktop/dist:/usr/share/nginx/html:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devpulse-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── FastAPI 应用 ────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: devpulse-api:${IMAGE_TAG:-latest}
    container_name: devpulse-api
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://devpulse:${DB_PASSWORD}@db:5432/devpulse
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-20}
      - DATABASE_MAX_OVERFLOW=${DATABASE_MAX_OVERFLOW:-10}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?err}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      - JWT_REFRESH_EXPIRE_DAYS=${JWT_REFRESH_EXPIRE_DAYS:-7}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEPLOY_MODE=${DEPLOY_MODE:-production}
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - LLM_MONTHLY_BUDGET=${LLM_MONTHLY_BUDGET:-50.0}
      - LLM_SUMMARY_BATCH_SIZE=${LLM_SUMMARY_BATCH_SIZE:-5}
      - FCM_ENABLED=${FCM_ENABLED:-false}
      - FCM_CREDENTIALS_PATH=${FCM_CREDENTIALS_PATH:-/app/firebase-credentials.json}
      - API_BASE_URL=${API_BASE_URL:-https://api.devpulse.app}
      - CDN_BASE_URL=${CDN_BASE_URL:-}
      - REVIEW_REQUIRED_THRESHOLD=${REVIEW_REQUIRED_THRESHOLD:-0.7}
      - CORS_ORIGINS=${CORS_ORIGINS:-["https://devpulse.app","capacitor://localhost","https://tauri.localhost"]}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SCHEDULER_ENABLED=${SCHEDULER_ENABLED:-true}
      - SCHEDULER_CRON_DAY=${SCHEDULER_CRON_DAY:-mon}
      - SCHEDULER_CRON_HOUR=${SCHEDULER_CRON_HOUR:-9}
      - SCHEDULER_CRON_MINUTE=${SCHEDULER_CRON_MINUTE:-0}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devpulse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── PostgreSQL 16 ───────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: devpulse-db
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${DB_USER:-devpulse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?err}
      POSTGRES_DB: ${DB_NAME:-devpulse}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - devpulse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-devpulse} -d ${DB_NAME:-devpulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Certbot (Let's Encrypt SSL) ─────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: devpulse-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped
    networks:
      - devpulse-net

volumes:
  pgdata:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local
  nginx_logs:
    driver: local

networks:
  devpulse-net:
    driver: bridge
